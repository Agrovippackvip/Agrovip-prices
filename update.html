<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actualizar Precios FOB — AgroVIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{--green:#064E3B;--green-mid:#065F46;--green-light:#D1FAE5;
          --gold:#F59E0B;--gold-light:#FEF3C7;--cream:#F8FAF4;
          --dark:#1F2937;--gray:#6B7280;--red:#DC2626;--white:#fff;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;}

    /* LOGIN */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,var(--green) 0%,#022C22 100%);}
    .login-box{background:#fff;border-radius:20px;padding:48px;width:100%;max-width:400px;
      text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
    .login-logo{font-size:48px;margin-bottom:12px;}
    .login-box h2{font-family:'Poppins',sans-serif;font-size:24px;font-weight:800;
      color:var(--green);margin-bottom:6px;}
    .login-box p{color:var(--gray);font-size:14px;margin-bottom:28px;}
    .login-box input{width:100%;padding:14px 18px;border:2px solid #E5E7EB;border-radius:10px;
      font-size:16px;margin-bottom:14px;outline:none;transition:border .2s;font-family:'Lato',sans-serif;}
    .login-box input:focus{border-color:var(--green);}
    .login-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;
      border-radius:10px;font-family:'Poppins',sans-serif;font-weight:700;font-size:16px;
      cursor:pointer;transition:background .2s;}
    .login-btn:hover{background:var(--green-mid);}
    .login-error{color:var(--red);font-size:13px;margin-top:10px;display:none;}

    /* APP */
    .app{display:none;}
    nav{background:var(--green);height:64px;display:flex;align-items:center;
      padding:0 32px;box-shadow:0 2px 16px rgba(0,0,0,.2);}
    .nav-brand{font-family:'Poppins',sans-serif;font-size:18px;font-weight:800;
      color:#fff;margin-right:auto;}
    .nav-brand span{color:var(--gold);}
    .nav-right{display:flex;align-items:center;gap:12px;}
    .nav-user{color:#A7F3D0;font-size:13px;}
    .nav-btn{background:rgba(255,255,255,.12);color:#fff;border:none;
      padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;
      text-decoration:none;display:inline-flex;align-items:center;gap:6px;
      transition:background .2s;}
    .nav-btn:hover{background:rgba(255,255,255,.22);}

    .container{max-width:960px;margin:0 auto;padding:36px 24px 80px;}

    /* STATUS */
    .status-banner{border-radius:12px;padding:14px 20px;margin-bottom:28px;
      display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;}
    .s-ok{background:#DCFCE7;color:#166534;border:1px solid #BBF7D0;}
    .s-warn{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;}
    .s-danger{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;}

    /* WEEK HEADER */
    .card{background:#fff;border-radius:16px;padding:28px;margin-bottom:20px;
      box-shadow:0 2px 12px rgba(6,78,59,.08);}
    .card-title{font-family:'Poppins',sans-serif;font-size:17px;font-weight:700;
      color:var(--green);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
    .fields-row{display:grid;gap:16px;}
    .fields-row.col2{grid-template-columns:1fr 2fr;}
    .fields-row.col3{grid-template-columns:1fr 2fr 2fr;}
    .field label{display:block;font-size:11px;font-weight:700;color:var(--green);
      text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
    .field input,.field select,.field textarea{width:100%;padding:10px 13px;
      border:2px solid #E5E7EB;border-radius:8px;font-size:14px;
      font-family:'Lato',sans-serif;outline:none;transition:border .2s;background:#fff;}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);}

    /* PRODUCT CALCULATOR CARD */
    .fruit-card{background:#fff;border-radius:16px;margin-bottom:16px;
      box-shadow:0 2px 12px rgba(6,78,59,.07);overflow:hidden;border-left:5px solid;}
    .fruit-header{display:flex;align-items:center;gap:12px;padding:18px 24px;
      cursor:pointer;user-select:none;}
    .fruit-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
    .fruit-header h3{font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;
      color:var(--dark);flex:1;}
    .fruit-header .kg-tag{font-size:12px;color:var(--gray);background:#F3F4F6;
      padding:3px 10px;border-radius:50px;}
    .fob-result-mini{font-family:'Poppins',sans-serif;font-weight:800;font-size:16px;
      color:var(--green);margin-left:auto;margin-right:12px;}
    .fruit-toggle{color:var(--gray);transition:transform .2s;}
    .fruit-body{display:none;padding:0 24px 24px;border-top:1px solid #F3F4F6;}
    .fruit-body.open{display:block;}

    /* COSTS GRID */
    .costs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:20px 0;}
    .cost-item label{display:block;font-size:10px;font-weight:700;color:var(--gray);
      text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
    .cost-item .input-prefix{display:flex;align-items:center;border:2px solid #E5E7EB;
      border-radius:8px;overflow:hidden;transition:border .2s;}
    .cost-item .input-prefix:focus-within{border-color:var(--green);}
    .cost-item .prefix{background:#F9FAFB;padding:9px 10px;font-size:13px;
      color:var(--gray);border-right:1px solid #E5E7EB;white-space:nowrap;}
    .cost-item input{border:none;outline:none;padding:9px 12px;font-size:14px;
      font-family:'Lato',sans-serif;width:100%;background:#fff;}
    .cost-item .fixed{background:#F9FAFB;color:var(--gray);font-size:13px;
      padding:10px 13px;border:2px solid #E5E7EB;border-radius:8px;}

    /* FOB RESULT BOX */
    .fob-box{background:linear-gradient(135deg,var(--green) 0%,#065F46 100%);
      border-radius:12px;padding:20px 24px;margin-top:16px;
      display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:center;}
    .fob-col{text-align:center;}
    .fob-col .lbl{font-size:10px;font-weight:700;color:#A7F3D0;
      text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
    .fob-col .val{font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;color:#fff;}
    .fob-col .val.gold{color:var(--gold);}
    .fob-col .sub{font-size:11px;color:#6EE7B7;margin-top:2px;}
    .cost-breakdown{margin-top:12px;background:rgba(255,255,255,.08);
      border-radius:8px;padding:12px 16px;}
    .cost-breakdown .row{display:flex;justify-content:space-between;
      font-size:12px;color:#A7F3D0;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.06);}
    .cost-breakdown .row:last-child{border:none;font-weight:700;color:#fff;margin-top:4px;}
    .cost-breakdown .row .lbl{color:#6EE7B7;}

    /* SAVE */
    .save-wrap{text-align:center;margin-top:32px;}
    .btn-save{background:var(--green);color:#fff;border:none;padding:18px 56px;
      border-radius:50px;font-family:'Poppins',sans-serif;font-weight:700;font-size:18px;
      cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:10px;
      box-shadow:0 4px 20px rgba(6,78,59,.3);}
    .btn-save:hover{background:var(--green-mid);transform:translateY(-2px);}
    .btn-save:disabled{background:#9CA3AF;cursor:not-allowed;transform:none;box-shadow:none;}
    .save-note{margin-top:12px;color:var(--gray);font-size:13px;}

    /* TOAST */
    .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
      padding:14px 28px;border-radius:50px;font-weight:700;font-size:15px;
      box-shadow:0 8px 32px rgba(0,0,0,.25);display:none;z-index:999;
      align-items:center;gap:10px;white-space:nowrap;}
    .toast.ok{background:var(--green);color:#fff;}
    .toast.err{background:var(--red);color:#fff;}

    @media(max-width:768px){
      .costs-grid{grid-template-columns:1fr 1fr;}
      .fob-box{grid-template-columns:1fr;}
      .fields-row.col2,.fields-row.col3{grid-template-columns:1fr;}
      .container{padding:20px 14px 60px;}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">

    <h2>AGROVIP</h2>

</div>

<!-- APP -->
<div class="app" id="appWrap">
  <nav>
    <span class="nav-brand">AGRO<span>VIP</span> &nbsp;·&nbsp;
      <span style="font-size:13px;font-weight:400;color:#A7F3D0;">Calculador FOB</span></span>
    <div class="nav-right">
      <a href="./precios.html" class="nav-btn" target="_blank">

  </nav>

  <div class="container">

    <div id="statusBanner" class="status-banner s-ok">

      <span id="statusText">Cargando...</span>
    </div>

    <!-- WEEK HEADER -->
    <div class="card">
      <div class="card-title"><i class="fa-solid fa-calendar-week"></i> Período Semanal</div>
      <div class="fields-row col3">
        <div class="field">
          <label>Semana #</label>
          <input type="number" id="fSemana" placeholder="26" min="1" max="53">

        <div class="field">
          <label>Período</label>

        </div>
        <div class="field">

    <!-- FRUIT CARDS -->
    <div class="card-title" style="padding:0 0 12px;">
      <i class="fa-solid fa-calculator" style="color:var(--green)"></i>

    <div class="save-wrap">

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────
const SB_URL  = 'https://asexyvzorhdddsgjqczh.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzZXh5dnpvcmhkZGRzZ2pxY3poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ3NjU2NTcsImV4cCI6MjA2MDM0MTY1N30.wABmVMQzKuSvoAfyMHkDEzpqmwehiSTTPKS4_z7SHac';
const EJS_SVC = 'service_lptgrd5';

const USERS = { 'agrovip2025':'Daniel Polit', 'lili2025':'Lilibeth' };
const ALERT_EMAILS = [
  { name:'Daniel',   email:'ventas@agrovipsas.com' },
  { name:'Lilibeth', email:'lilibeth@agrovipsa.com' },
];

// ── FRUITS CONFIG ─────────────────────────────────────────
const FRUITS = [
  { id:'pitahaya_roja',   name:'Pitahaya Pulpa Roja',    en:'Red Flesh Dragon Fruit',    color:'#E91E63', kg:4.5,  iica:true  },
  { id:'pitahaya_blanca', name:'Pitahaya Pulpa Blanca',  en:'White Flesh Dragon Fruit',  color:'#FF5722', kg:4.5,  iica:true  },
  { id:'golden_yellow',   name:'Golden Yellow',          en:'Yellow Dragon Fruit',       color:'#FDD835', kg:4.5,  iica:true  },
  { id:'palora',          name:'Palora Amarilla',        en:'Palora Yellow Dragon Fruit',color:'#FF8F00', kg:2.5,  iica:true  },
  { id:'limon',           name:'Limón Tahití',           en:'Persian Lime · 33 lb',      color:'#7CB342', kg:15,   iica:false },
  { id:'granadilla',      name:'Granadilla',             en:'Sweet Passion Fruit',       color:'#7B1FA2', kg:3,    iica:false },
  { id:'pepino',          name:'Pepino Melón',           en:'Pepino Melon',              color:'#00897B', kg:2.5,  iica:false },
  { id:'tomate',          name:'Tomate de Árbol',        en:'Tree Tomato / Tamarillo',   color:'#D84315', kg:2.5,  iica:false },
];

// Fixed costs per kg/caja
const IICA_KG     = 0.0345;  // per kg, pitahayas only
const AGROCAL_BOX = 0.50;    // per box
const TRANSP_KG   = 0.13;    // per kg

let sb, currentUser;

// ── LOGIN ──────────────────────────────────────────────────
function doLogin() {
  const pass = document.getElementById('loginPass').value.trim();
  const user = USERS[pass];
  if (!user) { document.getElementById('loginError').style.display='block'; return; }
  currentUser = user;
  sessionStorage.setItem('av_user', user);
  showApp();
}
function logout() { sessionStorage.clear(); location.reload(); }

function showApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appWrap').style.display   = 'block';
  document.getElementById('navUser').textContent     = `👤 ${currentUser}`;
  sb = supabase.createClient(SB_URL, SB_KEY);
  emailjs.init(EJS_KEY);
  buildFruitCards();
  loadLastData();
}

// ── BUILD CARDS ────────────────────────────────────────────
function buildFruitCards() {
  const wrap = document.getElementById('fruitCards');
  wrap.innerHTML = FRUITS.map(f => `
    <div class="fruit-card" id="card_${f.id}" style="border-color:${f.color};">
      <div class="fruit-header" onclick="toggleCard('${f.id}')">
        <div class="fruit-dot" style="background:${f.color};"></div>
        <h3>${f.name}</h3>
        <span class="kg-tag">${f.kg} kg/caja</span>
        <span class="fob-result-mini" id="mini_${f.id}">—</span>
        <i class="fa-solid fa-chevron-down fruit-toggle" id="tog_${f.id}"></i>
      </div>
      <div class="fruit-body" id="body_${f.id}">
        <p style="font-size:12px;color:var(--gray);margin:12px 0 4px;">
          ${f.en} &nbsp;·&nbsp; ${f.kg} kg por caja
          ${f.iica ? '&nbsp;·&nbsp; IICA aplicado ($'+IICA_KG+'/kg)' : ''}
        </p>

        <div class="costs-grid">
          <div class="cost-item">
            <label>Precio fruta (USD/kg)</label>
            <div class="input-prefix">
              <span class="prefix">$/kg</span>
              <input type="number" id="${f.id}_fruta" step="0.01" min="0"
                placeholder="0.00" oninput="calcFOB('${f.id}')">
            </div>
          </div>
          <div class="cost-item">
            <label>Empaque / caja (USD)</label>
            <div class="input-prefix">
              <span class="prefix">$/caja</span>
              <input type="number" id="${f.id}_empaque" step="0.01" min="0"
                placeholder="0.00" oninput="calcFOB('${f.id}')">
            </div>
          </div>
          <div class="cost-item">
            <label>Maquila PackVip (USD/caja)</label>
            <div class="input-prefix">
              <span class="prefix">$/caja</span>
              <input type="number" id="${f.id}_maquila" step="0.01" min="0"
                placeholder="0.00" oninput="calcFOB('${f.id}')">
            </div>
          </div>
          <div class="cost-item">
            <label>PLU Stickers (USD/caja)</label>
            <div class="input-prefix">
              <span class="prefix">$/caja</span>
              <input type="number" id="${f.id}_plu" step="0.01" min="0"
                placeholder="0.00" oninput="calcFOB('${f.id}')">
            </div>
          </div>
          <div class="cost-item">
            <label>Transporte interno</label>
            <div class="fixed">$${TRANSP_KG}/kg × ${f.kg}kg = $${(TRANSP_KG*f.kg).toFixed(3)}/caja</div>
          </div>
          <div class="cost-item">
            <label>Agrocalidad</label>
            <div class="fixed">$${AGROCAL_BOX.toFixed(2)} / caja (fijo)</div>
          </div>
          ${f.iica ? `
          <div class="cost-item">
            <label>IICA</label>
            <div class="fixed">$${IICA_KG}/kg × ${f.kg}kg = $${(IICA_KG*f.kg).toFixed(4)}/caja</div>
          </div>` : ''}
          <div class="cost-item">
            <label>Margen (18%)</label>
            <div class="fixed" id="${f.id}_margen_display">Sobre costo total</div>
          </div>
          <div class="cost-item">
            <label>Disponibilidad</label>
            <select id="${f.id}_disp" style="width:100%;padding:10px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:14px;font-family:'Lato',sans-serif;outline:none;">
              <option value="Alta">✅ Alta</option>
              <option value="Media">⚠️ Media</option>
              <option value="Baja">❌ Baja</option>
            </select>
          </div>
          <div class="cost-item">
            <label>Nota para cliente</label>
            <div class="input-prefix">
              <input type="text" id="${f.id}_nota" placeholder="Ej: Temporada alta...">
            </div>
          </div>
        </div>

        <!-- FOB RESULT -->
        <div class="fob-box" id="fob_${f.id}">
          <div class="fob-col">
            <div class="lbl">Costo Total / caja</div>
            <div class="val" id="${f.id}_costo">$0.00</div>
            <div class="sub">${f.kg} kg</div>
          </div>
          <div class="fob-col">
            <div class="lbl">FOB Publicado / caja</div>
            <div class="val gold" id="${f.id}_fob_caja">$0.00</div>
            <div class="sub">Margen 18% incluido</div>
          </div>
          <div class="fob-col">
            <div class="lbl">FOB / kg</div>
            <div class="val gold" id="${f.id}_fob_kg">$0.00</div>
            <div class="sub">USD por kilogramo</div>
          </div>
        </div>
        <div class="cost-breakdown" id="breakdown_${f.id}" style="background:rgba(6,78,59,.06);border-radius:8px;padding:12px 16px;margin-top:10px;">
          <div class="row"><span class="lbl">Fruta</span><span id="${f.id}_b_fruta">—</span></div>
          <div class="row"><span class="lbl">Empaque</span><span id="${f.id}_b_empaque">—</span></div>
          <div class="row"><span class="lbl">Maquila</span><span id="${f.id}_b_maquila">—</span></div>
          <div class="row"><span class="lbl">PLU</span><span id="${f.id}_b_plu">—</span></div>
          <div class="row"><span class="lbl">Transporte</span><span id="${f.id}_b_transp">$${(TRANSP_KG*f.kg).toFixed(2)}</span></div>
          <div class="row"><span class="lbl">Agrocalidad</span><span>$${AGROCAL_BOX.toFixed(2)}</span></div>
          ${f.iica ? `<div class="row"><span class="lbl">IICA</span><span>$${(IICA_KG*f.kg).toFixed(3)}</span></div>` : ''}
          <div class="row"><span class="lbl">Margen 18%</span><span id="${f.id}_b_margen">—</span></div>
          <div class="row" style="border-top:1px solid rgba(6,78,59,.15);padding-top:6px;margin-top:4px;">
            <span style="font-weight:700;color:var(--green);">FOB Total</span>
            <span style="font-weight:800;color:var(--green);" id="${f.id}_b_total">—</span>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleCard(id) {
  const body = document.getElementById(`body_${id}`);
  const tog  = document.getElementById(`tog_${id}`);
  const open = body.classList.toggle('open');
  tog.style.transform = open ? 'rotate(180deg)' : '';
}

// ── CALCULATE FOB ──────────────────────────────────────────
function calcFOB(id) {
  const f = FRUITS.find(x => x.id === id);
  const fruta   = parseFloat(document.getElementById(`${id}_fruta`).value)   || 0;
  const empaque = parseFloat(document.getElementById(`${id}_empaque`).value) || 0;
  const maquila = parseFloat(document.getElementById(`${id}_maquila`).value) || 0;
  const plu     = parseFloat(document.getElementById(`${id}_plu`).value)     || 0;

  const c_fruta   = fruta * f.kg;
  const c_transp  = TRANSP_KG * f.kg;
  const c_agrocal = AGROCAL_BOX;
  const c_iica    = f.iica ? IICA_KG * f.kg : 0;

  const costo_base = c_fruta + empaque + maquila + plu + c_transp + c_agrocal + c_iica;
  const margen_val = costo_base * MARGIN;
  const fob_caja   = costo_base + margen_val;
  const fob_kg     = f.kg > 0 ? fob_caja / f.kg : 0;

  // Update result box
  document.getElementById(`${id}_costo`).textContent    = `$${costo_base.toFixed(2)}`;
  document.getElementById(`${id}_fob_caja`).textContent = `$${fob_caja.toFixed(2)}`;
  document.getElementById(`${id}_fob_kg`).textContent   = `$${fob_kg.toFixed(2)}`;
  document.getElementById(`mini_${id}`).textContent     = `$${fob_caja.toFixed(2)}/caja`;
  document.getElementById(`${id}_margen_display`).textContent = `$${margen_val.toFixed(2)} (18%)`;

  // Breakdown
  document.getElementById(`${id}_b_fruta`).textContent   = `$${c_fruta.toFixed(2)}`;
  document.getElementById(`${id}_b_empaque`).textContent = `$${empaque.toFixed(2)}`;
  document.getElementById(`${id}_b_maquila`).textContent = `$${maquila.toFixed(2)}`;
  document.getElementById(`${id}_b_plu`).textContent     = `$${plu.toFixed(2)}`;
  document.getElementById(`${id}_b_margen`).textContent  = `$${margen_val.toFixed(2)}`;
  document.getElementById(`${id}_b_total`).textContent   = `$${fob_caja.toFixed(2)}`;
}

// ── LOAD LAST DATA ─────────────────────────────────────────
async function loadLastData() {
  try {
    const { data } = await sb.from('precios_semana')
      .select('*').order('created_at',{ascending:false}).limit(1).single();
    if (!data) { updateStatus(null); return; }

    document.getElementById('fSemana').value = data.semana || '';
    document.getElementById('fFecha').value  = data.fecha  || '';
    document.getElementById('fNota').value   = data.nota   || '';

    const p = data.precios || {};
    FRUITS.forEach(f => {
      const pd = p[f.id] || {};
      if (pd.fruta_kg)   { document.getElementById(`${f.id}_fruta`).value   = pd.fruta_kg; }
      if (pd.empaque)    { document.getElementById(`${f.id}_empaque`).value  = pd.empaque; }
      if (pd.maquila)    { document.getElementById(`${f.id}_maquila`).value  = pd.maquila; }
      if (pd.plu)        { document.getElementById(`${f.id}_plu`).value      = pd.plu; }
      if (pd.disponibilidad) document.getElementById(`${f.id}_disp`).value   = pd.disponibilidad;
      if (pd.nota)       { document.getElementById(`${f.id}_nota`).value     = pd.nota; }
      calcFOB(f.id);
    });
    updateStatus(data.updated_at || data.created_at);
  } catch(e) { updateStatus(null); }
}

function updateStatus(ts) {
  const el  = document.getElementById('statusBanner');
  const txt = document.getElementById('statusText');
  if (!ts) {
    el.className = 'status-banner s-warn';
    txt.innerHTML = '⚠️ &nbsp;Sin datos previos. Completa el formulario y guarda.';
    return;
  }
  const days = Math.floor((new Date() - new Date(ts)) / 86400000);
  const dateStr = new Date(ts).toLocaleDateString('es-EC',{weekday:'long',day:'numeric',month:'long'});
  if (days <= 7) {
    el.className = 'status-banner s-ok';
    txt.innerHTML = `✅ &nbsp;Última actualización: <strong>${dateStr}</strong> (hace ${days} día${days!==1?'s':''}).`;
  } else {
    el.className = 'status-banner s-danger';
    txt.innerHTML = `⚠️ &nbsp;Última actualización: <strong>${dateStr}</strong> — Han pasado <strong>${days} días</strong>. ¡Actualizar precios!`;
  }
}

// ── SAVE ALL ───────────────────────────────────────────────
async function saveAll() {
  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';

  const semana = document.getElementById('fSemana').value.trim();
  const fecha  = document.getElementById('fFecha').value.trim();
  const nota   = document.getElementById('fNota').value.trim();

  if (!semana || !fecha) {
    showToast('Completa el número de semana y el período.', true);
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Guardar y Publicar Precios';
    return;
  }

  // Build precios object
  const precios = {};
  FRUITS.forEach(f => {
    const fruta_kg = parseFloat(document.getElementById(`${f.id}_fruta`).value)   || 0;
    const empaque  = parseFloat(document.getElementById(`${f.id}_empaque`).value) || 0;
    const maquila  = parseFloat(document.getElementById(`${f.id}_maquila`).value) || 0;
    const plu      = parseFloat(document.getElementById(`${f.id}_plu`).value)     || 0;
    const disp     = document.getElementById(`${f.id}_disp`).value;
    const notaF    = document.getElementById(`${f.id}_nota`).value.trim();

    const c_fruta   = fruta_kg * f.kg;
    const c_transp  = TRANSP_KG * f.kg;
    const c_iica    = f.iica ? IICA_KG * f.kg : 0;
    const costo     = c_fruta + empaque + maquila + plu + c_transp + AGROCAL_BOX + c_iica;
    const fob_caja  = costo * (1 + MARGIN);
    const fob_kg    = f.kg > 0 ? fob_caja / f.kg : 0;

    precios[f.id] = {
      producto:       f.name,
      variedad:       f.en,
      kg_por_caja:    f.kg,
      fruta_kg,  empaque, maquila, plu,
      fob:            `$${fob_caja.toFixed(2)} / caja (${f.kg}kg)`,
      fob_caja:       parseFloat(fob_caja.toFixed(2)),
      fob_kg:         parseFloat(fob_kg.toFixed(2)),
      disponibilidad: disp,
      notas:          notaF || `Precio puede variar según volumen de pedido.`,
    };
  });

  try {
    const { error } = await sb.from('precios_semana').insert({
      semana, fecha, nota, precios,
      updated_by: currentUser,
      updated_at: new Date().toISOString(),
    });
    if (error) throw error;
    showToast('✅ Precios FOB publicados exitosamente.');
    updateStatus(new Date().toISOString());
  } catch(e) {
    showToast('Error: ' + e.message, true);
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Guardar y Publicar Precios';
}

// ── TOAST ──────────────────────────────────────────────────
function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast ' + (isErr ? 'err' : 'ok');
  t.style.display = 'flex';
  setTimeout(() => t.style.display='none', 4500);
}

// ── AUTO LOGIN ─────────────────────────────────────────────
window.onload = () => {
  const u = sessionStorage.getItem('av_user');
  if (u) { currentUser = u; showApp(); }
};
